# MemRoPE + LongLive — 120s (480 latent frames)
# Cache structure: [Sink 3] + [Long-term EMA 1] + [Short-term EMA 1] + [Recent 4] + [New 3] = 12

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3

model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3
  recent_size: 4
  use_block_rope: true
  compression_method: ema
  ema_alpha_long: 0.01
  ema_alpha_short: 0.1

# Inference
data_path: prompts/moviegenbench_128_refined.txt
output_folder: outputs/longlive/120s
inference_iter: -1
num_output_frames: 480
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0
long_video_mode: true
vae_chunk_size: 120

generator_ckpt: checkpoints/longlive_base.pt
lora_ckpt: checkpoints/lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false
