# SemanticForcing + Self-Forcing — 120s (480 latent frames)
# Content-aware memory merging (cluster compression) variant of MemRoPE.
# Cache structure: [Sink 3] + [Long-term mem 1] + [Short-term mem 1] + [Recent 4] + [New 3] = 12
# Memory slots are content prototypes (online clustering), not fixed (h,w) bins.

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3

model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3
  recent_size: 4
  use_block_rope: true
  compression_method: cluster
  ema_alpha_long: 0.01
  ema_alpha_short: 0.1
  # exp3 memory-attention corrections (default off = identical to prior behavior).
  # mem_logn_bias:  add log(n_i) to memory-key attention logits (n_i = effective count).
  # mem_key_renorm: rescale memory prototype key to running-mean raw norm r_i at read.
  mem_logn_bias: false
  mem_key_renorm: false
  # exp5 value refinement (default off = identical to prior behavior). Requires
  # compression_method=eviction + mem_side_buffer=true. At the clean pass, refine
  # each new clean recent VALUE toward its key-matched long-memory prototype value
  # via a soft-gated convex blend g=alpha*sigmoid((tau-vsim)/beta) (low value
  # cos-sim -> stronger refine). gate: "matched" (key-matched proto value) | "top1".
  mem_value_refine: false
  mem_value_refine_gate: matched
  mem_value_refine_tau: 0.6
  mem_value_refine_beta: 0.1
  mem_value_refine_alpha: 1.0
  # gate_fn: "sigmoid" g=alpha*sigmoid((tau-vsim)/beta) | "relu" g=alpha*clamp((tau-vsim)/tau,0)
  mem_value_refine_gate_fn: sigmoid
  # which transformer blocks to refine: "all" | "10,11,12" | "10-20" | "0,5,10-12"
  mem_value_refine_blocks: all
  # after blending, rescale each head-vector back to the original v_new norm
  # (blend shrinks norm -> blur; restoring magnitude keeps energy). true|false
  mem_value_refine_norm_restore: true

# Inference
data_path: prompts/moviegenbench_128_refined.txt
output_folder: outputs/selfforcing/120s_semantic
inference_iter: -1
num_output_frames: 480
use_ema: true
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0
long_video_mode: true
vae_chunk_size: 120

generator_ckpt: checkpoints/self_forcing_dmd.pt
